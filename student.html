<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <?!= include('style'); ?>
</head>
<body class="student-body">

  <!-- ═══ 입장 화면 ═══ -->
  <div id="entry-screen" class="screen active">
    <div class="entry-container">
      <div class="logo-area">
        <div class="logo-icon">
          <svg viewBox="0 0 48 48" fill="none">
            <rect x="4" y="4" width="40" height="40" rx="12" fill="#FF6B35"/>
            <text x="24" y="32" text-anchor="middle" fill="white" font-size="24" font-weight="bold">Q</text>
          </svg>
        </div>
        <h1 class="app-title">실시간 퀴즈</h1>
        <p class="app-subtitle">이름을 입력하고 퀴즈에 참여하세요</p>
      </div>
      <div class="input-group">
        <label for="student-name">이름 (별명)</label>
        <input type="text" id="student-name" placeholder="예: 홍길동" maxlength="20" autocomplete="off">
      </div>
      <button class="btn btn-primary btn-lg" onclick="enterQuiz()">
        <span>참여하기</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <!-- ═══ 퀴즈 목록 ═══ -->
  <div id="quiz-list-screen" class="screen">
    <header class="top-bar">
      <div class="user-badge" id="user-badge"></div>
      <button class="btn btn-ghost btn-sm" onclick="refreshQuizzes()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        새로고침
      </button>
    </header>
    <div class="content-area">
      <h2 class="section-title">진행 중인 퀴즈</h2>
      <div id="quiz-list" class="quiz-grid">
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <p>현재 진행 중인 퀴즈가 없습니다</p>
          <p class="text-muted">잠시 후 새로고침해 보세요</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ 퀴즈 응답 화면 ═══ -->
  <div id="quiz-answer-screen" class="screen">
    <header class="top-bar">
      <button class="btn btn-ghost btn-sm" onclick="backToList()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        목록으로
      </button>
    </header>
    <div class="content-area">
      <div class="quiz-card-hero">
        <div class="quiz-type-badge" id="quiz-type-badge">퀴즈</div>
        <h2 class="quiz-question" id="quiz-question-text"></h2>
      </div>
      <div id="options-container" class="options-list"></div>
      <button class="btn btn-primary btn-lg btn-submit" id="submit-btn" onclick="submitAnswer()" disabled>
        제출하기
      </button>
    </div>
  </div>

  <!-- ═══ 결과 화면 ═══ -->
  <div id="result-screen" class="screen">
    <div class="result-container">
      <div class="result-icon" id="result-icon"></div>
      <h2 class="result-title" id="result-title"></h2>
      <p class="result-message" id="result-message"></p>
      <button class="btn btn-primary btn-lg" onclick="backToList()">다른 퀴즈 풀기</button>
    </div>
  </div>

  <!-- ═══ 로딩 오버레이 ═══ -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner"></div>
    <p>처리 중...</p>
  </div>

  <?!= include('student_script'); ?>
</body>
</html>
